<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f8eff">
  <meta name="robots" content="index, follow">

  <title>Decision Tree Builder — Create &amp; Export Interactive Trees</title>
  <meta name="description" content="A free visual editor to build, preview and export interactive decision trees as JSON. No sign-up required.">
  <meta name="author" content="tinvojh">
  <link rel="canonical" href="https://example.com/decision-tree-builder">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Decision Tree Builder">
  <meta property="og:description" content="Build, preview and export interactive decision trees with a clean visual editor.">
  <meta property="og:url"         content="https://example.com/decision-tree-builder">
  <meta property="og:locale"      content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Decision Tree Builder">
  <meta name="twitter:description" content="Build, preview and export interactive decision trees with a clean visual editor.">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Decision Tree Builder",
    "description": "A free visual editor to build, preview, and export interactive decision trees as JSON.",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <link rel="stylesheet" href="decision-tree.css">
</head>
<body>

  <!-- Accessible status toast -->
  <p id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></p>

  <!-- Delete confirmation dialog -->
  <dialog id="delete-modal" aria-labelledby="delete-heading">
    <h2 id="delete-heading" class="modal-heading">Confirm deletion</h2>
    <p id="delete-msg" class="modal-msg"></p>
    <menu class="modal-actions">
      <li><button id="confirm-delete" class="btn btn-danger">Delete</button></li>
      <li><button id="cancel-delete"  class="btn btn-ghost">Cancel</button></li>
    </menu>
  </dialog>

  <div class="app">

    <header class="app-header">
      <h1 class="app-title">Decision Tree Builder</h1>

    </header>

    <nav class="tabs" role="tablist" aria-label="Application sections">
      <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="tab-editor"  data-tab="editor">Editor</button>
      <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="tab-preview" data-tab="preview">Preview</button>
    </nav>

    <main>

      <!-- Editor tab -->
      <section id="tab-editor" class="tab-panel active" role="tabpanel" aria-labelledby="tab-editor-label">
        <aside class="node-sidebar" aria-label="Node list">
          <div class="sidebar-toolbar">
            <button id="add-question" class="btn btn-primary">+ Question</button>
            <button id="add-result"   class="btn btn-success">+ Result</button>
          </div>
          <p class="sidebar-meta">
            <span><strong id="node-count">0</strong> nodes</span>
            <span>Start: <code id="start-label">&#8212;</code></span>
          </p>
          <div id="nodeList" class="node-list" role="list" aria-label="All nodes"></div>
        </aside>
        <div id="formArea" class="form-area" role="region" aria-label="Node editor"></div>
      </section>

      <!-- Preview tab -->
      <section id="tab-preview" class="tab-panel" role="tabpanel" aria-labelledby="tab-preview-label">
        <div id="previewPanel" class="preview-panel" aria-live="polite"></div>
      </section>

    </main>

  </div>

  <script src="decision-tree.js"></script>
</body>
</html>
